name: Update GitHub Stats

on:
  schedule: [cron: "0 0 * * *"]  # раз в сутки
  workflow_dispatch:             # + ручное обновление

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate language stats
        uses: lowlighter/metrics@latest
        with:
          filename: stats/languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_colors: radical
          plugin_languages_ignored: html,css,markdown
          plugin_languages_details: bytes-size,percentage
          plugin_languages_threshold: 0.1%
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f stats/languages.svg
          git commit -m "chore: update language stats" || exit 0
          git push